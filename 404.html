<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page introuvable · Anthropotech</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --bg: #f5f3ef; --ink: #1a1a18; --ink-dim: #7a7a72;
    --accent: #7a1f2e; --line: #e0ddd7;
    --f-serif: Georgia, 'Times New Roman', serif;
    --f-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f1117; --ink: #e8e4dd; --ink-dim: #4a5568; --line: #252d3d; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--f-sans); min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .eyebrow {
    font-size: .6rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1.5rem;
  }
  .num {
    font-family: var(--f-serif); font-size: 7rem; font-weight: 300;
    color: var(--ink); line-height: 1; margin-bottom: 1rem;
    opacity: .15;
  }
  h1 {
    font-family: var(--f-serif); font-size: 1.8rem; font-weight: 300;
    margin-bottom: 1rem; line-height: 1.3;
  }
  h1 em { font-style: italic; color: var(--accent); }
  p {
    font-size: .9rem; color: var(--ink-dim); max-width: 400px;
    line-height: 1.7; margin-bottom: 2rem;
  }
  .btn {
    display: inline-block; padding: .7rem 1.8rem;
    border: 1px solid var(--accent); color: var(--accent);
    font-family: var(--f-sans); font-size: .75rem;
    letter-spacing: .12em; text-transform: uppercase;
    text-decoration: none; transition: all .2s;
  }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .logo {
    margin-top: 3rem; font-family: var(--f-sans);
    font-size: .6rem; letter-spacing: .25em;
    text-transform: uppercase; color: var(--ink-dim); opacity: .5;
  }
</style>
</head>
<body>
  <p class="eyebrow">Anthropotech — Magazine</p>
  <div class="num">404</div>
  <h1>Cette page a <em>disparu</em></h1>
  <p>L'article que tu cherches n'existe pas, a été déplacé, ou l'URL est incorrecte. Retourne à l'accueil pour retrouver les 36 articles du magazine.</p>
  <a href="/Anthropotech/" class="btn">Retour à l'accueil</a>
  <p class="logo">Anthropo<strong>tech</strong></p>
</body>
</html>
