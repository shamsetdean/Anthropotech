<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable · Anthropotech · Lab</title>
<meta name="robots" content="noindex">
<script>
  (function() {
    var path = window.location.pathname;
    var match = path.match(/\/Anthropotech\/article\/([^\/]+)/);
    if (match) {
      window.location.replace('https://shamsetdean.github.io/Anthropotech/?article=' + match[1]);
    }
  })();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#f5f3ef; --ink:#1a1f2e; --ink-dim:#9aa0ae; --accent:#7a1f2e; }

  :root { --bg:#0f1117; --ink:#e8e4dd; --ink-dim:#4a5568; --accent:#b5394d; }
}
body { background:var(--bg); color:var(--ink); font-family:system-ui,sans-serif; font-weight:300; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
.wrap { max-width:480px; }
.eyebrow { font-size:.6rem; letter-spacing:.3em; text-transform:uppercase; color:var(--accent); margin-bottom:1.5rem; }
.code { font-family:Georgia,serif; font-size:clamp(5rem,20vw,9rem); font-weight:300; color:var(--accent); line-height:1; letter-spacing:-.02em; }
.line { width:60px; height:1px; background:var(--accent); margin:1.5rem auto; }
.title { font-family:Georgia,serif; font-size:1.4rem; font-weight:300; margin-bottom:.8rem; }
.sub { font-size:.88rem; color:var(--ink-dim); line-height:1.7; margin-bottom:2rem; font-style:italic; }
.redirect-msg { font-size:.75rem; color:var(--ink-dim); margin-bottom:1rem; font-style:italic; }
.btn { display:inline-block; font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--bg); background:var(--accent); border:none; padding:.7rem 1.8rem; text-decoration:none; }
.btn:hover { opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Anthropotech · Lab</p>
  <div class="code">404</div>
  <div class="line"></div>
  <h1 class="title">Page introuvable</h1>
  <p class="redirect-msg" id="msg"></p>
  <p class="sub">Cette page n'existe pas ou a été déplacée.<br>Retournez à l'accueil pour continuer votre lecture.</p>
  <a class="btn" href="/Anthropotech/">Retour à l'accueil</a>

<script>
  var match = window.location.pathname.match(/\/Anthropotech\/article\/([^\/]+)/);
  if (match) document.getElementById('msg').textContent = 'Redirection vers l\'article en cours…';
</script>
